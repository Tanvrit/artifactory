name: Update Release Manifest

on:
  repository_dispatch:
    types: [update-manifest]
  workflow_dispatch:
    inputs:
      product:
        description: 'Product slug'
        required: true
      version:
        description: 'Version (e.g. 1.2.0)'
        required: true
      build:
        description: 'Build number'
        required: true
      released_at:
        description: 'ISO timestamp (defaults to now)'
        required: false
      release_notes:
        description: 'English release notes'
        required: false
      release_notes_hi:
        description: 'Hindi release notes'
        required: false

jobs:
  update:
    name: Update ${{ github.event.client_payload.product || github.event.inputs.product }} manifest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Extract payload
        id: payload
        run: |
          PRODUCT="${{ github.event.client_payload.product || github.event.inputs.product }}"
          VERSION="${{ github.event.client_payload.version || github.event.inputs.version }}"
          BUILD="${{ github.event.client_payload.build || github.event.inputs.build }}"
          RELEASED_AT="${{ github.event.client_payload.released_at || github.event.inputs.released_at }}"
          [ -z "$RELEASED_AT" ] && RELEASED_AT=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          RELEASE_NOTES="${{ github.event.client_payload.release_notes || github.event.inputs.release_notes }}"
          RELEASE_NOTES_HI="${{ github.event.client_payload.release_notes_hi || github.event.inputs.release_notes_hi }}"
          echo "product=$PRODUCT"             >> $GITHUB_OUTPUT
          echo "version=$VERSION"             >> $GITHUB_OUTPUT
          echo "build=$BUILD"                 >> $GITHUB_OUTPUT
          echo "released_at=$RELEASED_AT"     >> $GITHUB_OUTPUT
          echo "release_notes=$RELEASE_NOTES" >> $GITHUB_OUTPUT
          echo "release_notes_hi=$RELEASE_NOTES_HI" >> $GITHUB_OUTPUT

      - name: Generate manifest + update catalog
        run: |
          ARGS=(
            --product    "${{ steps.payload.outputs.product }}"
            --version    "${{ steps.payload.outputs.version }}"
            --build      "${{ steps.payload.outputs.build }}"
            --released-at "${{ steps.payload.outputs.released_at }}"
          )
          NOTES="${{ steps.payload.outputs.release_notes }}"
          NOTES_HI="${{ steps.payload.outputs.release_notes_hi }}"
          [ -n "$NOTES" ]    && ARGS+=(--release-notes    "$NOTES")
          [ -n "$NOTES_HI" ] && ARGS+=(--release-notes-hi "$NOTES_HI")
          node scripts/update-manifest.js "${ARGS[@]}"

      - name: Commit manifest updates
        run: |
          git config user.name "tanvrit-bot"
          git config user.email "bot@tanvrit.com"
          git add manifests/
          git commit -m "release: ${{ steps.payload.outputs.product }} v${{ steps.payload.outputs.version }}"
          git push

      - name: Upload manifests to Cloudflare R2
        run: |
          PRODUCT="${{ steps.payload.outputs.product }}"
          VERSION="${{ steps.payload.outputs.version }}"

          npx wrangler r2 object put "tanvrit-artifacts/manifests/${PRODUCT}/latest.json" \
            --file "manifests/${PRODUCT}/latest.json" \
            --content-type "application/json"

          npx wrangler r2 object put "tanvrit-artifacts/manifests/${PRODUCT}/${VERSION}.json" \
            --file "manifests/${PRODUCT}/${VERSION}.json" \
            --content-type "application/json"

          npx wrangler r2 object put "tanvrit-artifacts/catalog.json" \
            --file "manifests/catalog.json" \
            --content-type "application/json"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_R2_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        working-directory: worker
