<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!--
    Bharat Bandhu — Community Commerce Icon
    Brand: Pink #BE185D → #EC4899
    Safe zone: artwork within 880×880 circle centered at 512,512 (radius 440)
    Concept: Community circle / heart — bandhu means friend/ally
    Renderer: sharp
  -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EC4899"/>
      <stop offset="100%" stop-color="#831843"/>
    </linearGradient>
    <linearGradient id="heart" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#FCE7F3" stop-opacity="0.9"/>
    </linearGradient>
    <radialGradient id="person" cx="40%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#FCE7F3"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="224" ry="224" fill="url(#bg)"/>

  <!-- Community ring -->
  <circle cx="512" cy="512" r="300" fill="none" stroke="white" stroke-width="28" stroke-dasharray="40 20" opacity="0.3"/>

  <!-- Center heart -->
  <path d="M 512 680
           C 512 680 320 560 320 430
           C 320 360 370 310 420 310
           C 460 310 490 330 512 360
           C 534 330 564 310 604 310
           C 654 310 704 360 704 430
           C 704 560 512 680 512 680 Z"
        fill="url(#heart)"/>

  <!-- Three community person silhouettes around heart -->
  <!-- Left person -->
  <circle cx="300" cy="450" r="48" fill="white" opacity="0.8"/>
  <ellipse cx="300" cy="570" rx="56" ry="44" fill="white" opacity="0.7"/>

  <!-- Right person -->
  <circle cx="724" cy="450" r="48" fill="white" opacity="0.8"/>
  <ellipse cx="724" cy="570" rx="56" ry="44" fill="white" opacity="0.7"/>

  <!-- Top person -->
  <circle cx="512" cy="260" r="40" fill="white" opacity="0.75"/>
  <ellipse cx="512" cy="360" rx="48" ry="40" fill="white" opacity="0.65"/>
</svg>
