<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!--
    Tanvrit Mark — Master Icon
    Brand: Forest Green #1A5C3A (primary), Saffron Gold #F59E0B (accent)
    Safe zone: all artwork within 880×880 circle centered at 512,512 (radius 440)
    Concept: 5-circle constellation forming T-shape (Tanvrit's 5 products)
    Renderer: sharp
  -->
  <defs>
    <radialGradient id="bg-grad" cx="50%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#22754A"/>
      <stop offset="100%" stop-color="#0A1A0F"/>
    </radialGradient>
    <radialGradient id="circle-grad" cx="40%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#4CC87E"/>
      <stop offset="100%" stop-color="#1A5C3A"/>
    </radialGradient>
    <radialGradient id="accent-grad" cx="40%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#FCD34D"/>
      <stop offset="100%" stop-color="#D97706"/>
    </radialGradient>
    <!-- Safe zone guide (remove in production) -->
    <!-- <circle cx="512" cy="512" r="440" fill="none" stroke="rgba(255,0,0,0.2)" stroke-width="2"/> -->
  </defs>

  <!-- Background: rounded square (squircle-like, matches iOS/macOS shape) -->
  <rect x="0" y="0" width="1024" height="1024" rx="224" ry="224" fill="url(#bg-grad)"/>

  <!-- 5-circle constellation — T shape -->
  <!-- Top row: 3 circles (horizontal bar of T) -->
  <circle cx="300" cy="380" r="100" fill="url(#circle-grad)" opacity="0.95"/>
  <circle cx="512" cy="360" r="120" fill="url(#circle-grad)"/>
  <circle cx="724" cy="380" r="100" fill="url(#circle-grad)" opacity="0.95"/>

  <!-- Bottom: 2 circles (vertical stem of T) -->
  <circle cx="440" cy="600" r="90"  fill="url(#circle-grad)" opacity="0.90"/>
  <circle cx="590" cy="680" r="80"  fill="url(#circle-grad)" opacity="0.85"/>

  <!-- Saffron Gold accent dot — center circle highlight -->
  <circle cx="512" cy="360" r="40" fill="url(#accent-grad)" opacity="0.9"/>

  <!-- Subtle connector lines between circles -->
  <line x1="300" y1="380" x2="512" y2="360" stroke="#2E9E63" stroke-width="8" stroke-linecap="round" opacity="0.4"/>
  <line x1="512" y1="360" x2="724" y2="380" stroke="#2E9E63" stroke-width="8" stroke-linecap="round" opacity="0.4"/>
  <line x1="512" y1="360" x2="440" y2="600" stroke="#2E9E63" stroke-width="8" stroke-linecap="round" opacity="0.4"/>
  <line x1="440" y1="600" x2="590" y2="680" stroke="#2E9E63" stroke-width="8" stroke-linecap="round" opacity="0.4"/>
</svg>
