<svg xmlns="http://www.w3.org/2000/svg" width="400" height="80" viewBox="0 0 400 80">
  <!--
    Tanvrit Wordmark — Light variant (for dark backgrounds)
    Use on Forest Green or dark backgrounds
  -->
  <!-- T-mark icon (small, white) -->
  <g transform="translate(0, 8) scale(0.0625)">
    <circle cx="280" cy="380" r="100" fill="#F0FDF4" opacity="0.9"/>
    <circle cx="512" cy="360" r="120" fill="#FFFFFF"/>
    <circle cx="744" cy="380" r="100" fill="#F0FDF4" opacity="0.9"/>
    <circle cx="440" cy="600" r="90"  fill="#F0FDF4" opacity="0.85"/>
    <circle cx="590" cy="680" r="80"  fill="#F0FDF4" opacity="0.80"/>
    <circle cx="512" cy="360" r="40"  fill="#F59E0B" opacity="0.95"/>
  </g>

  <!-- "tanvrit" wordmark text (white/light) -->
  <text x="80" y="56"
        font-family="'Plus Jakarta Sans', 'Inter', sans-serif"
        font-weight="800"
        font-size="48"
        letter-spacing="-1"
        fill="#FFFFFF">tanvrit</text>
</svg>
